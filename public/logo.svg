  <path d="M58 13.7H71.2" stroke="url(#wordAccent)" stroke-width="3.2" stroke-linecap="round" />
  <path d="M76.8 13.7H101.6" stroke="var(--logo-border)" stroke-width="3.2" stroke-linecap="round" />
  <text x="119" y="15.8" fill="var(--logo-muted)" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="7.8" font-weight="700" letter-spacing="1.25">CV / BLOG</text>

  <defs>
    <linearGradient id="markStroke" x1="17" y1="15" x2="37" y2="34" gradientUnits="userSpaceOnUse">
      <stop stop-color="var(--logo-primary)" />
      <stop offset="1" stop-color="var(--logo-accent)" />
    </linearGradient>
    <linearGradient id="wordAccent" x1="58" y1="13.7" x2="71.2" y2="13.7" gradientUnits="userSpaceOnUse">
      <stop stop-color="var(--logo-primary)" />
      <stop offset="1" stop-color="var(--logo-accent)" />
    </linearGradient>
  </defs>
</svg>
