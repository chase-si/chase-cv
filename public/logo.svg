<svg width="184" height="48" viewBox="0 0 184 48" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Chase logo</title>
  <desc id="desc">A compact Chase wordmark with a layered traditional Wu character mark.</desc>
  <style>
    :root {
      --logo-ink: #18181b;
      --logo-muted: #71717a;
      --logo-panel: #ffffff;
      --logo-panel-soft: #f4f4f5;
      --logo-border: rgba(24, 24, 27, 0.12);
      --logo-primary: #4f46e5;
      --logo-accent: #0ea5e9;
      --logo-shadow: rgba(24, 24, 27, 0.18);
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --logo-ink: #fafafa;
        --logo-muted: #a1a1aa;
        --logo-panel: #18181b;
        --logo-panel-soft: #27272a;
        --logo-border: rgba(250, 250, 250, 0.16);
        --logo-primary: #818cf8;
        --logo-accent: #38bdf8;
        --logo-shadow: rgba(0, 0, 0, 0.5);
      }
    }
  </style>

  <filter id="markShadow" x="0" y="0" width="56" height="56" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
    <feDropShadow dx="0" dy="8" stdDeviation="6" flood-color="var(--logo-shadow)" flood-opacity="1" />
  </filter>

  <g filter="url(#markShadow)">
    <rect x="7" y="12" width="34" height="34" rx="12" fill="var(--logo-panel-soft)" />
    <rect x="11" y="10" width="34" height="34" rx="12" fill="var(--logo-panel)" stroke="var(--logo-border)" />
    <text
      x="28"
      y="34.2"
      fill="url(#markStroke)"
      font-family="'Noto Serif TC', 'Songti TC', 'PingFang TC', 'Microsoft JhengHei', serif"
      font-size="23"
      font-weight="800"
      letter-spacing="0"
      text-anchor="middle"
    >吳</text>
    <path d="M16.2 38.1H39.8" stroke="var(--logo-muted)" stroke-width="1.5" stroke-linecap="round" opacity="0.24" />
    <path d="M17.2 15.7H38.4" stroke="var(--logo-muted)" stroke-width="1.5" stroke-linecap="round" opacity="0.18" />
  </g>

